{{define "denied"}}<!DOCTYPE html>
<!--
  Login-policy deny page. Rendered with HTTP 403 when a validated OIDC
  subject is not permitted by the configured login policy (no existing
  users row AND OIDC_AUTO_CREATE is false, and the subject is not an
  admin). The visitor is authenticated to the IdP but NOT admitted to
  Reduit, so there is no Reduit session and the base layout (which
  needs an Identity badge) does not apply -- this is a standalone,
  self-contained document.

  Governing: ADR-0004 (OIDC), ADR-0010 (users/accounts split),
  SPEC-0005 REQ "OIDC Login Flow" ("If the login policy denies the
  user, the server SHALL respond 403 Forbidden — contact your
  administrator").
-->
<html lang="en" data-theme="reduit-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access denied — Reduit</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  /* Inter variable font, served locally (no rsms.me CDN). Governing:
     ADR-0005 (no runtime CDN). This page is otherwise self-contained
     inline CSS -- it does not load the Tailwind/DaisyUI bundle. */
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 100 900;
    font-display: swap;
    src: url('/static/vendor/InterVariable.woff2') format('woff2');
  }
  :root { font-family: 'Inter', system-ui, sans-serif; }
  body {
    background: #0F172A; color: #E2E8F0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    margin: 0;
  }
  .card {
    background: #1E293B; border: 1px solid #334155; border-radius: 0.75rem;
    padding: 3rem; max-width: 32rem; text-align: center;
  }
  h1 { font-weight: 600; font-size: 1.5rem; margin: 1.5rem 0 0.75rem; }
  p { color: #94A3B8; line-height: 1.6; margin: 0 0 0.5rem; }
  .muted { color: #64748B; font-size: 0.875rem; margin-top: 1.5rem; }
  a { color: #C7D2FE; }
</style>
</head>
<body>
  <div class="card">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#F43F5E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto;display:block"><path d="M12 2L4 5v6c0 5 3.5 9.5 8 11 4.5-1.5 8-6 8-11V5l-8-3z"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
    <h1>Access denied</h1>
    <p>
      Your identity was verified, but this account is not permitted to
      use Reduit.
    </p>
    <p>Please contact your administrator to request access.</p>
    <p class="muted">
      <a href="/auth/login">Try a different account</a>
    </p>
  </div>
</body>
</html>{{end}}
