# AI bot — self-reference-triggered review/address/merge on PRs.
# Action: https://gitea.stump.rocks/stumpcloud/gitea-aibot-action
#
# Triggers only when the PR's own author self-references:
#   * @-mention yourself in a PR comment         -> code review
#   * leave an inline review comment on the PR    -> address it (edit + push + reply)
#   * comment LGTM / ship it, or formally Approve -> merge (squash)
name: aibot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  aibot:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issue_comment'
        && github.event.issue.pull_request != null
        && github.event.comment.user.login == github.event.issue.user.login)
      ||
      (github.event_name == 'pull_request_review_comment'
        && github.event.sender.login == github.event.pull_request.user.login)
      ||
      (github.event_name == 'pull_request_review'
        && github.event.sender.login == github.event.pull_request.user.login)
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.head_ref }}
          fetch-depth: 0

      - name: AI bot
        uses: https://gitea.stump.rocks/stumpcloud/gitea-aibot-action@main
        env:
          AIBOT_HARNESS: ${{ vars.AIBOT_HARNESS || 'claude' }}
          AIBOT_MODEL:   ${{ vars.AIBOT_MODEL   || 'claude-haiku-4-5-20251001' }}
          AIBOT_LITELLM_BASE_URL: ${{ secrets.AIBOT_LITELLM_BASE_URL }}
          AIBOT_LITELLM_API_KEY:  ${{ secrets.AIBOT_LITELLM_API_KEY }}
          AIBOT_GITEA_HOST:  ${{ github.server_url }}
          AIBOT_GITEA_TOKEN: ${{ github.token }}
          AIBOT_MERGE_TOKEN: ${{ secrets.AIBOT_MERGE_TOKEN }}
          AIBOT_BOT_LOGIN:   ${{ vars.AIBOT_BOT_LOGIN }}
