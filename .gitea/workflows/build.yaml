# Gitea Actions: build + test + push the reduit container image to
# gitea.stump.rocks/self-hosted/reduit.
#
# This file is recognized only on the Gitea side. github.com silently
# ignores `.gitea/` (GitHub Actions reads `.github/`). The flow:
#
#   1. Source lives on github.com/joestump/reduit (source-of-truth).
#   2. gitea.stump.rocks/stumpcloud/reduit is a pull mirror, syncing
#      every 10 minutes.
#   3. On push to main (after the mirror sync completes), this
#      workflow runs on Gitea Actions: tests pass, image builds,
#      Trivy scans, push to the local registry.
#   4. Stumpcloud's Ansible playbook references `:latest` with
#      `pull: always`, so the next deploy on ie01 picks up HEAD.
#
# Modeled on stumpcloud/docker's docker.yaml. Tests run inside the
# workflow rather than trusting GitHub's CI -- the Gitea-side gate
# fails closed if a regression slips through.

name: build-and-push

on:
  push:
    branches: [main]
  # Allow manual re-runs from the Gitea Actions UI without waiting
  # for a fresh push (useful for retrying flakes or rebuilding after
  # a registry-side change).
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -count=1 ./...

  image:
    name: build + scan + push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        run: docker run --rm --privileged tonistiigi/binfmt --install all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # vars.LOCAL_REGISTRY = gitea.stump.rocks
          # vars.REGISTRY_NAMESPACE = self-hosted
          images: |
            ${{ vars.LOCAL_REGISTRY }}/${{ vars.REGISTRY_NAMESPACE }}/reduit
          # Tagging strategy:
          #   - :latest -- tracks main HEAD (consumed by stumpcloud
          #     ansible playbook with `pull: always`)
          #   - :sha-<short> -- traceable per-commit tag for debugging
          #     and for pinning during a controlled rollout
          #   - :main -- branch ref tag, redundant with :latest but
          #     useful if a future branch-based deploy strategy lands
          tags: |
            type=raw,value=latest,enable={{ is_default_branch }}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Login to Gitea container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.LOCAL_REGISTRY }}
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      # Build amd64 first into a local-only "scan" tag so Trivy can
      # inspect a real image instead of a manifest list. Failure here
      # blocks the multi-arch push -- we don't ship images with
      # critical/high CVEs that have a fix available.
      - name: Build amd64 image for Trivy scan
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ vars.LOCAL_REGISTRY }}/${{ vars.REGISTRY_NAMESPACE }}/reduit:scan
          build-args: |
            VERSION=${{ gitea.sha }}
          cache-from: type=registry,ref=${{ vars.LOCAL_REGISTRY }}/${{ vars.REGISTRY_NAMESPACE }}/reduit:buildcache

      - name: Trivy image scan
        uses: docker://aquasec/trivy:latest
        with:
          args: image --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 --format table ${{ vars.LOCAL_REGISTRY }}/${{ vars.REGISTRY_NAMESPACE }}/reduit:scan

      # Build for amd64 only at first -- ie01 is the only deploy
      # target today. Add linux/arm64 (or arm/v8) when reduit is
      # deployed on a Pi or arm64 host. Cheap to add later.
      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ gitea.sha }}
          cache-from: type=registry,ref=${{ vars.LOCAL_REGISTRY }}/${{ vars.REGISTRY_NAMESPACE }}/reduit:buildcache
          cache-to: type=registry,ref=${{ vars.LOCAL_REGISTRY }}/${{ vars.REGISTRY_NAMESPACE }}/reduit:buildcache,mode=max
