# Gitea Actions: build + test + push the reduit container image to
# gitea.stump.rocks/joestump/reduit.
#
# Source-of-truth lives at gitea.stump.rocks/joestump/reduit. On
# every push to main, this workflow runs:
#   - go test -race
#   - docker build (amd64)
#   - Trivy scan (fail-closed on HIGH/CRITICAL)
#   - push to gitea.stump.rocks/joestump/reduit:{latest,main,sha-<short>}
# Source repo and image registry path live in the same namespace
# (joestump) so the per-run `gitea.token` (auto-issued with
# packages:write on the running repo's owner) authenticates without
# needing a cross-namespace PAT.
# Stumpcloud's Ansible playbook references `:latest` with
# `pull: always`, so the next ie01 redeploy picks up HEAD.
#
# Test-gate scope: this workflow does NOT run go test. The
# comprehensive CI gate (cross-OS test matrix, staticcheck,
# govulncheck) runs on github.com/joestump/reduit on every push,
# which is where the canonical test gate lives. Reasons:
#   - Gitea Actions' act_runner is more contended than GitHub's
#     hosted runners, and reduit's constant-time-auth tests
#     (TestSASLPlainAuthFailuresAreIdentical etc.) flake under
#     contention because they measure submit/fail latencies with
#     tight tolerances.
#   - Running tests in two places duplicates CPU without catching
#     anything new under normal merge flow.
# Net: this is a pure build-and-publish path. If GitHub CI is
# bypassed (admin merge etc.), nothing here catches a regression
# before the image lands -- accept that risk in exchange for
# stable, fast image builds.
#
# Modeled on stumpcloud/docker's docker.yaml.

name: build-and-push

on:
  push:
    branches: [main]
  # Manual re-runs from the Gitea Actions UI -- retrying a flaky
  # Trivy scan, rebuilding after a registry-side change, etc.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.ref }}
  cancel-in-progress: true

jobs:
  image:
    name: build + scan + push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        run: docker run --rm --privileged tonistiigi/binfmt --install all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            gitea.stump.rocks/joestump/reduit
          # Tagging strategy:
          #   - :latest -- tracks main HEAD (consumed by stumpcloud
          #     ansible playbook with `pull: always`)
          #   - :sha-<short> -- traceable per-commit tag for debugging
          #     and for pinning during a controlled rollout
          #   - :main -- branch ref tag, redundant with :latest but
          #     useful if a future branch-based deploy strategy lands
          tags: |
            type=raw,value=latest,enable={{ is_default_branch }}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Login to Gitea container registry
        uses: docker/login-action@v3
        with:
          registry: gitea.stump.rocks
          # The per-run `secrets.GITEA_TOKEN` works for the Gitea API
          # but NOT for the container registry (which expects a real
          # user PAT with the `write:package` scope -- regular API
          # auth is rejected with 401). `secrets.REGISTRY_TOKEN` is a
          # purpose-scoped PAT named "reduit-actions-registry-push"
          # set on this repo only, with no other privileges.
          username: joestump
          password: ${{ secrets.REGISTRY_TOKEN }}

      # Build amd64 first into a run-scoped local-only "scan" tag so
      # Trivy can inspect a real image instead of a manifest list.
      # Tag scoped with `${{ gitea.run_id }}` so concurrent dispatches
      # sharing a runner's docker daemon don't race on the same scan
      # tag. Failure here blocks the push -- we don't ship images
      # with critical/high CVEs that have a fix available.
      - name: Build amd64 image for Trivy scan
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          load: true
          tags: gitea.stump.rocks/joestump/reduit:scan-${{ gitea.run_id }}
          build-args: |
            VERSION=${{ gitea.sha }}
          cache-from: type=registry,ref=gitea.stump.rocks/joestump/reduit:buildcache

      # Trivy floating tag matches stumpcloud/mirror's docker.yaml
      # convention (governed by that repo's ADR-0005). Severity floor
      # is HIGH+CRITICAL with --ignore-unfixed, so MEDIUM CVEs ship
      # silently -- by design, since "no upstream fix available" means
      # there's nothing actionable for us to do.
      - name: Trivy image scan
        uses: docker://aquasec/trivy:latest
        with:
          args: image --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 --format table gitea.stump.rocks/joestump/reduit:scan-${{ gitea.run_id }}

      # Build for amd64 only at first -- ie01 is the only deploy
      # target today. Add linux/arm64 (or arm/v8) when reduit is
      # deployed on a Pi or arm64 host. Cheap to add later.
      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ gitea.sha }}
          cache-from: type=registry,ref=gitea.stump.rocks/joestump/reduit:buildcache
          cache-to: type=registry,ref=gitea.stump.rocks/joestump/reduit:buildcache,mode=max
